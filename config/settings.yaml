# LLM provider configuration
# provider: ollama | openai | gemini | groq
#
# ollama  — local, free, no key needed. Best for privacy (nothing leaves the machine).
#           Popular models: llama3.1:8b, mistral:7b, qwen2.5:7b
# groq    — free tier available, very fast inference. Set GROQ_API_KEY in .env.
#           Popular models: llama-3.1-8b-instant, mixtral-8x7b-32768, gemma2-9b-it
# openai  — Set OPENAI_API_KEY in .env. Models: gpt-4o-mini, gpt-4o
# gemini  — Set GEMINI_API_KEY in .env. Models: gemini-1.5-flash, gemini-1.5-pro
#
# Only computed statistics (~200 tokens) are sent — no raw data, no row values.
# Column names ARE included in the payload (unavoidable for recipe keying).
llm:
  provider: "ollama"
  model: "llama3.1:8b"
  base_url: "http://localhost:11434/v1"   # only used for ollama (custom endpoint)
  timeout_seconds: 60
  max_retries: 2

# Confidence thresholds
confidence_threshold: 0.85

# Validation gate thresholds
validation_gate:
  max_row_loss_pct: 15
  min_series_length: 30

# Stage 1: ingestion settings
ingest:
  row_limit: null          # null = fetch all rows; set an integer to cap rows (useful for large tables during dev)
  raw_format: parquet
  top_n_categories: 5      # how many top values to include in cardinality stats

# Stage 2: pre-cleaning EDA settings
pre_clean_eda:
  outlier_iqr_multiplier: 1.5          # IQR fence multiplier (standard = 1.5, strict = 3.0)
  outlier_zscore_threshold: 3.0        # |z| > this → outlier
  outlier_mad_threshold: 3.0           # |x - median| / MAD > this → outlier
  constant_col_variance_threshold: 0.001  # std/|mean| < this → near-constant
  structural_breaks_min_rows: 50       # skip break detection if fewer rows
  structural_breaks_penalty: "bic"     # ruptures penalty: "bic" | "aic" | "l2"
